name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

jobs:
  # ============================================
  # HAUTE PRIORITÉ - Code Quality & Type Check
  # ============================================

  lint:
    name: ESLint (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/test

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/test

      - name: Build application
        run: npm run build

  # ============================================
  # BASSE PRIORITÉ - Tests
  # ============================================

  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/test

      - name: Run tests
        run: npm test

  # ============================================
  # DÉPLOIEMENT - SEULEMENT sur main après CI réussi
  # ============================================

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: |
          # Attendre un peu que Render soit prêt à recevoir le hook
          sleep 5
          
          # Appeler le Deploy Hook de Render
          # REMPLACEZ 'VOTRE_DEPLOY_HOOK_URL' par votre URL depuis Render Dashboard
          # Dans Render: Settings → Deploy Hooks
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        env:
          # Variables d'environnement nécessaires au build sur Render (optionnel)
          NODE_ENV: production
